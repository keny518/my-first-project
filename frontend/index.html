<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Workout Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <h1>Workout Tracker</h1>
    <div id="status" role="status" aria-live="polite"></div>
    <div id="auth">
      <h2>Auth</h2>
      <input id="name" placeholder="Name (register)" />
      <input id="email" placeholder="Email" />
      <input id="password" type="password" placeholder="Password" />
      <button id="register">Register</button>
      <button id="login">Login</button>
    </div>

    <div id="main" style="display:none">
      <button id="logout">Logout</button>
      <h2>Create Workout</h2>
      <input id="w_type" placeholder="Type (e.g., cardio)" />
      <input id="w_date" type="date" />
      <input id="w_dur" type="number" placeholder="Duration minutes" />
      <button id="create_workout">Create</button>

      <h2>Your Workouts</h2>
      <ul id="workouts"></ul>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
